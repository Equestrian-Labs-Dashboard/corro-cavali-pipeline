name: Historical Dashboard Backfill

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests gspread google-auth pytz

      - name: Check backfill version
        run: |
          if grep -q "Limpiando tabs existentes" backfill_historical.py; then
            echo "::error::OLD backfill_historical.py detected. It clears Sheets at start."
            exit 1
          fi
          grep -n "Safe mode\|smartrr product volume" backfill_historical.py || true

      - name: Run historical backfill
        env:
          SHOPIFY_TOKEN_CORRO: ${{ secrets.SHOPIFY_TOKEN_CORRO }}
          SHOPIFY_TOKEN_CAVALI: ${{ secrets.SHOPIFY_TOKEN_CAVALI }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SMARTRR_API_KEY_CAVALI: ${{ secrets.SMARTRR_API_KEY_CAVALI }}
        run: python -u backfill_historical.py
