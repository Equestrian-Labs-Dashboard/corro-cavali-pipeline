name: Daily Dashboard Pipeline

on:
  schedule:
    # GitHub Actions cron runs in UTC.
    # 05:15 UTC = 00:15 New York in winter / 01:15 New York in summer.
    # This guarantees the daily run happens AFTER North America / Eastern midnight.
    - cron: '15 5 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests gspread google-auth pytz

      - name: Run pipeline — Cavali first
        env:
          SHOPIFY_TOKEN_CORRO: ${{ secrets.SHOPIFY_TOKEN_CORRO }}
          SHOPIFY_TOKEN_CAVALI: ${{ secrets.SHOPIFY_TOKEN_CAVALI }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SMARTRR_API_KEY_CAVALI: ${{ secrets.SMARTRR_API_KEY_CAVALI }}
          RUN_BRANDS: cavali,corro
        run: |
          echo "RUN_BRANDS=$RUN_BRANDS"
          python -u pipeline.py
